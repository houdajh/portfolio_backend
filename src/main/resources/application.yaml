spring:
  application:
    name: devBrain-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  ai:
    openai:
      api-key: ${VOYAGE_API_KEY}
      base-url: https://api.voyageai.com

    vectorstore:
      qdrant:
        url: ${QDRANT_URL}
        api-key: ${QDRANT_API_KEY}
        collection-name: portfolio_docs
        initialize-schema: true

server:
  port: ${SERVER_PORT:8080}

app:
  library:
    github:
      owner: houdajh
      repo: rag-data
      branch: master
      base-path: library
      token: ${GITHUB_TOKEN}
