    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Ff6136581}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
  ai:
    openai:
      api-key: ${GROQ_API_KEY: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}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.1-8b-instant
    model:
      embedding: transformers

    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:d4f98c22-82e6-4b27-9dae-43190b10a888.eu-west-1-0.aws.cloud.qdrant.io}
        port: ${QDRANT_PORT:6334}
        use-tls: true
